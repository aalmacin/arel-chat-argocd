apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-setup
  namespace: argocd
spec:
  project: default
  source:
    path: templates/platform/istio-setup
    repoURL: https://github.com/aalmacin/arel-chat-argocd.git
    targetRevision: HEAD
  destination:
    namespace: istio-system
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true